    <text x="10.2" y="17.85" font-size="0.34">SHEET 003</text>
    <text x="6.6" y="18.55" font-size="0.4" letter-spacing="0.08">CARTRIDGE</text>
    <text x="6.6" y="18.95" font-size="0.26" opacity="0.7">FIELD ISSUE · MK I</text>
    <text x="10.2" y="18.55" font-size="0.26">SCALE 1 : 3</text>
    <text x="10.2" y="18.95" font-size="0.26" opacity="0.7">FACE + ¾</text>
