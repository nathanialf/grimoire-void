<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#bfff00" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/images/rings.svg" />
    <title>GRIMOIRE VOID</title>
  </head>
  <body>
    <div id="root">
      <div style="position:fixed;inset:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;gap:0.6em">
        <span style="display:inline-block;width:1.4em;height:1.4em;background-color:#bfff00;mask-image:url('/images/rings.svg');-webkit-mask-image:url('/images/rings.svg');mask-size:contain;-webkit-mask-size:contain;mask-repeat:no-repeat;-webkit-mask-repeat:no-repeat;mask-position:center;-webkit-mask-position:center;animation:loadingSpin 1.6s linear infinite"></span>
        <span style="font-family:monospace;font-size:0.85rem;letter-spacing:0.3em;color:#bfff00;text-transform:uppercase">Loading</span>
      </div>
    </div>
    <style>html,body{margin:0;padding:0;background:#0a0a0a}@keyframes loadingSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
